<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fűszer Fészer Webshop</title>

    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" />

    <!-- Bootstrap icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- CSS -->
    <link href="css/styles.css" rel="stylesheet" />

    <style>
        .offcanvas {
            width: 260px;
        }

        .offcanvas .nav-link {
            color: white;
        }

        .offcanvas .nav-link:hover {
            color: #ccc;
        }
    </style>
</head>

<body>
<div id="webshop-content">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid px-4 px-lg-5">

            <!-- HAMBURGER BUTTON -->
            <button class="btn btn-outline-dark me-2"
                    data-bs-toggle="offcanvas"
                    data-bs-target="#sidebarMenu">
                <i class="bi-list"></i>
            </button>

            <!-- LOGO -->
            <a class="navbar-brand" href="#">Fűszer Fészer és Grill Garázs</a>

            <!-- LEFT MENU -->
            <ul class="navbar-nav me-auto ms-3">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="loadPage('index')">Főoldal</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="loadPage('about')">Rólunk</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="loadPage('contact')">Kapcsolat</a>
                </li>
            </ul>

            <!-- RIGHT MENU -->
            <ul class="navbar-nav ms-auto align-items-center">

                <li class="nav-item me-3">
                    <input type="text" class="form-control" placeholder="Keresés..." style="width: 250px;">
                </li>

                <li class="nav-item me-3">
                    <button class="btn btn-outline-dark" onclick="loadPage('cart')">
                        <i class="bi-cart-fill me-1"></i>
                        Cart
                        <span class="badge bg-dark text-white ms-1 rounded-pill">0</span>
                    </button>
                </li>

                <li class="nav-item me-2">
                    <a class="nav-link" href="#" onclick="loadPage('login')">Belépés</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="loadPage('register')">Regisztráció</a>
                </li>

            </ul>

        </div>
    </nav>

    <!-- SIDEBAR (OFFCANVAS) -->
    <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebarMenu">

        <div class="offcanvas-header">
            <h5 class="offcanvas-title">Menü</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>

        <div class="offcanvas-body">

            <h6>Kategóriák</h6>
            <ul class="nav flex-column mb-3">
                <li class="nav-item"><a class="nav-link" href="#">Összes</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Fűszerek</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Grill</a></li>
                <li class="nav-item"><a class="nav-link" href="#">Akciók</a></li>
            </ul>

            <hr class="bg-light">

            <h6>Szűrés</h6>
            <label>Ár</label>
            <input type="range" class="form-range">

        </div>
    </div>

    <!-- HEADER -->
    <header class="py-5"
        style="background-image: url('assets/Fuszer_feszer.png'); background-size: cover; background-position: center;">
        <div class="container text-center text-white">
            <h1 class="fw-bolder">Fűszer Fészer és Grill Garázs</h1>
            <p>Ízek kincseskamrája</p>
        </div>
    </header>

    <!-- PRODUCTS -->
    <section class="py-5 bg-light">
        <div class="container px-4 px-lg-5 mt-5">

            <div class="row row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">

                <!-- PRODUCT -->
                <div class="col mb-5">
                    <div class="card h-100">
                        <img class="card-img-top" src="assets/Products/Lucullus_Sertéssült_Fűszer.jpg" />
                        <div class="card-body text-center">
                            <h5 class="fw-bolder">Lucullus Sertéssült Fűszer</h5>
                            $40.00
                        </div>
                        <div class="card-footer text-center">
                            <button class="btn btn-outline-dark">Kosárba</button>
                        </div>
                    </div>
                </div>

                <!-- PRODUCT -->
                <div class="col mb-5">
                    <div class="card h-100">
                        <img class="card-img-top" src="assets/Products/Suncity_best_of_grill_fűszercsomag.webp" />
                        <div class="card-body text-center">
                            <h5 class="fw-bolder">Grill Fűszercsomag</h5>
                            $18.00
                        </div>
                        <div class="card-footer text-center">
                            <button class="btn btn-outline-dark">Kosárba</button>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="py-5 bg-dark">
        <div class="container text-center text-white">
            © 2026 Fűszer Fészer
        </div>
    </footer>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
