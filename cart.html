<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Kosár</h1>
            <p>Termékek a kosárban:</p>
            <ul id="cart-items-list"></ul>
        <h1>Fizetési lehetőségek</h1>
        <div>
            <button id="pay-barion" class="btn btn-primary">Fizetés Barion-nal</button>
        </div>
        <div class="mt-3">
            <button id="pay-simplepay" class="btn btn-primary">Fizetés SimplePay-jel</button>
        </div>
        <script>
        async function checkout(provider) {
        const cartItems = window.cartItems || [{name:'Tesztdog',quantity:1,price:100}]; // kapcs.
        const total = cartItems.reduce((s,i)=>s+i.price*i.quantity, 0);

        const url = `/create-payment/${provider}`;
        const r = await fetch(url, {
            method:'POST',
            headers:{ 'Content-Type':'application/json' },
            body: JSON.stringify({ items: cartItems, total })
        });
        const json = await r.json();
        if (json.url) window.location = json.url;
        else alert('Hiba: ' + JSON.stringify(json));
        }

        document.getElementById('pay-barion').onclick = ()=> checkout('barion');
        document.getElementById('pay-simplepay').onclick = ()=> checkout('simplepay');
        </script>
    </body>
</html>
