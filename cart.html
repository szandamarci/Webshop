<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Termékek a kosárban:</h1>
        <div id="cart-items-container"></div>

        <template id="cart-item-template">
            <div class="d-flex align-items-center mb-1 cart-item-row">
                <div class="cart-item-details me-3"></div>

                <div class="btn-group ms-auto me-3" role="group">
                    <button class="btn btn-sm btn-outline-secondary decrement-cart-item" type="button">-</button>
                    <span class="px-2 cart-item-qty">0</span>
                    <button class="btn btn-sm btn-outline-secondary increment-cart-item" type="button">+</button>
                </div>
            </div>
        </template>

        <h1>Összesen:</h1>
            <p id="total-price">0 Ft</p>

        <h1>Fizetési lehetőségek</h1>
        <div>
            <button id="forward-to-payment" class="btn btn-primary">Tovább a fizetéshez</button>
        </div>
    </body>
</html>
