<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Számlázási adatok</h1>
        <div id="billing-info" class="mb-3"></div>

        <div id="billing-form-section">
            <form id="billing-form" novalidate>
                <div class="form-group mb-3">
                    <label for="billing-first-name">Vezetéknév</label>
                    <input type="text" class="form-control" id="billing-first-name" required placeholder="Enter first name">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-last-name">Keresztnév</label>
                    <input type="text" class="form-control" id="billing-last-name" required placeholder="Enter last name">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-email">Email cím</label>
                    <input type="email" class="form-control" id="billing-email" required placeholder="Enter email">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-phone">Telefonszám</label>
                    <input type="tel" class="form-control" id="billing-phone" required placeholder="Enter phone number">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-address">Utca, házszám</label>
                    <input type="text" class="form-control" id="billing-address" required placeholder="Enter address">
                </div>
                    <div class="form-group mb-3">
                    <label for="billing-city">Város</label>
                    <input type="text" class="form-control" id="billing-city" required placeholder="Enter city">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-zip">Irányítószám</label>
                    <input type="text" class="form-control" id="billing-zip" required placeholder="Enter zip code">
                </div>
                <div class="form-group mb-3">
                    <label for="billing-country">Ország</label>
                    <input type="text" class="form-control" id="billing-country" required placeholder="Enter country">
                </div>
                <h1>Szállítási lehetőségek</h1>
                <div class="mb-3" style="max-width: 360px;">
                    <label for="shipping-method-select" class="form-label">Válassz szállítási módot</label>
                    <select id="shipping-method-select" class="form-select">
                        <option value="Házhozszállítás" selected>Házhozszállítás</option>
                        <option value="Személyes átvétel">Személyes átvétel</option>
                    </select>
                </div>
                <div>
                <h1>Fizetési lehetőségek</h1>
                <div class="mb-3" style="max-width: 360px;">
                    <label for="payment-method-select" class="form-label">Válassz fizetési módot</label>
                    <select id="payment-method-select" class="form-select">
                        <option value="barion" selected>Barion</option>
                        <option value="simplepay">SimplePay</option>
                        <option value="afterpay">Utánvét</option>
                    </select>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="read-terms-and-conditions" id="read-terms-and-conditions" unchecked>
                    <label class="form-check-label" for="read-terms-and-conditions">Az <a href="#" onclick="loadPage('terms'); return false;">Általános Szerződési Feltételeket</a> elolvastam</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="read-privacy-policy" id="read-privacy-policy" unchecked>
                    <label class="form-check-label" for="read-privacy-policy">Az <a href="#" onclick="loadPage('privacy'); return false;">Adatvédelmi Szabályzatot</a> elolvastam</label>
                </div>
            </form>
        </div>
        
        <div>
            <button id="pay-selected-method" type="button" class="btn btn-primary">Tovább</button>
        </div>
        <p id="payment-status" class="mt-3"></p>
    </body>
</html>
