<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Regisztráció</h1>
        <form id="register-form" onsubmit="handleRegister(event)">
            <div class="form-group mb-3">
                <label for="register-email">Email cím</label>
                <input type="email" class="form-control" id="register-email" required placeholder="Enter email">
            </div>
            <div class="form-group mb-3">
                <label for="register-first-name">Vezetéknév</label>
                <input type="text" class="form-control" id="register-first-name" required placeholder="Enter first name">
            </div>
            <div class="form-group mb-3">
                <label for="register-last-name">Keresztnév</label>
                <input type="text" class="form-control" id="register-last-name" required placeholder="Enter last name">
            </div>
            <div class="form-group mb-3">
                <label for="register-password">Jelszó</label>
                <input type="password" class="form-control" id="register-password" required minlength="6" placeholder="Password">
            </div>
            <div class="form-group mb-4">
                <label for="confirmPassword">Jelszó megerősítése</label>
                <input type="password" class="form-control" id="confirmPassword" required minlength="6" placeholder="Confirm Password">
            </div>
            <button type="submit" class="btn btn-primary">Regisztráció</button>
            <div id="register-message" class="mt-3"></div>
        </form>
    </body>
</html>
