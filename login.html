<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Shop Homepage - Start Bootstrap Template</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <h1>Belépés</h1>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group mb-3">
                <label for="login-email">Email cím</label>
                <input type="email" class="form-control" id="login-email" required placeholder="Enter email">
            </div>
            <div class="form-group mb-3">
                <label for="login-password">Jelszó</label>
                <input type="password" class="form-control" id="login-password" required placeholder="Password">
            </div>
            <button type="submit" class="btn btn-primary">Belépés</button>
            <div id="login-message" class="mt-3"></div>
        </form>
    </body>
</html>
